<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PontoApp Premium</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f9cf9">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#161a23;--surface2:#1e2330;--surface3:#252b3b;
  --border:#2a3042;--border2:#3a4258;
  --text:#e8eaf0;--text2:#8892a4;--text3:#5a6478;
  --accent:#4f9cf9;--accent2:#3d7fd4;--accent-glow:rgba(79,156,249,0.15);
  --green:#34c975;--green-bg:rgba(52,201,117,0.1);--green-border:rgba(52,201,117,0.3);
  --red:#f05252;--red-bg:rgba(240,82,82,0.1);--red-border:rgba(240,82,82,0.3);
  --amber:#f0a830;--amber-bg:rgba(240,168,48,0.1);
  --radius:10px;--radius-lg:16px;--radius-xl:24px;
  --font-main:'Sora',sans-serif;--font-mono:'DM Mono',monospace;
  --glass: rgba(22, 26, 35, 0.7);
  --glass-border: rgba(255, 255, 255, 0.08);
}
body{background:var(--bg);color:var(--text);font-family:var(--font-main);min-height:100vh;font-size:14px;line-height:1.6;overflow-x:hidden;}
h1,h2,h3,h4{font-weight:500;letter-spacing:-0.02em;}
button{font-family:var(--font-main);cursor:pointer;border:none;outline:none;transition:all .18s;}
input,select,textarea{font-family:var(--font-main);outline:none;}

#app{display:flex;flex-direction:column;min-height:100vh;max-width:500px;margin:0 auto;padding:0 16px 80px;}

/* NAV - Desktop default, will move to bottom on mobile */
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:600;letter-spacing:-0.03em;}
.nav-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}
.nav-dot-off{background:var(--text3)!important;box-shadow:none!important;}
.nav-tabs{display:flex;gap:4px;}
.tab-btn{padding:7px 14px;border-radius:var(--radius);background:transparent;color:var(--text2);font-size:13px;font-weight:500;border:1px solid transparent;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.tab-btn:hover{background:var(--surface2);color:var(--text);}
.tab-btn.active{background:var(--surface2);color:var(--text);border-color:var(--border);}
.sync-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;display:flex;align-items:center;gap:5px;}

@media (max-width: 600px) {
  #app { max-width: 100%; padding-bottom: 100px; }
  .nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--glass);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    border-bottom: none;
    padding: 12px 20px env(safe-area-inset-bottom);
    margin-bottom: 0;
    z-index: 900;
    justify-content: center;
  }
  .nav-logo { display: none; }
  .nav-tabs { width: 100%; justify-content: space-around; gap: 0; }
  .tab-btn { flex: 1; border: none!important; background: transparent!important; font-size: 11px; padding: 8px 0; }
  .tab-btn.active { color: var(--accent); }
  .sync-badge { position: absolute; top: -40px; right: 16px; background: var(--surface2); }
}

/* VIEWS */
.view{display:none;animation:fadeIn .22s ease;}
.view.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CLOCK VIEW */
.clock-hero{text-align:center;padding:32px 0 24px;}
.clock-display{font-family:var(--font-mono);font-size:56px;font-weight:500;letter-spacing:-0.03em;color:var(--text);line-height:1;margin-bottom:6px;}
.clock-date{font-size:13px;color:var(--text2);letter-spacing:0.04em;text-transform:uppercase;}

.session-status{display:flex;align-items:center;justify-content:center;gap:8px;margin:20px 0;font-size:13px;color:var(--text2);}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--text3);}
.pulse.active{background:var(--green);animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(52,201,117,0.4)}50%{box-shadow:0 0 0 6px rgba(52,201,117,0)}}

.btn-punch-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;margin:16px 0 28px;}
.btn-punch{width:160px;height:160px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);color:var(--text);font-size:15px;font-weight:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .22s;box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
.btn-punch:hover{border-color:var(--accent);background:var(--accent-glow);transform:scale(1.03);}
.btn-punch.running{border-color:var(--red);background:rgba(240,82,82,0.08);}
.btn-punch.running:hover{background:rgba(240,82,82,0.15);}
.btn-punch svg{width:28px;height:28px;}

.btn-manual-trigger{background:var(--surface2);color:var(--text2);border:1px solid var(--border);padding:8px 16px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:6px;}
.btn-manual-trigger:hover{color:var(--text);border-color:var(--text3);}

.session-timer{text-align:center;font-family:var(--font-mono);font-size:28px;color:var(--green);min-height:36px;font-weight:500;margin-bottom:4px;}
.session-label{text-align:center;font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:24px;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
@media (max-width: 480px) {
  .stats-row { grid-template-columns: 1fr 1fr; }
  .stat-card:last-child { grid-column: span 2; }
}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.stat-value{font-family:var(--font-mono);font-size:22px;font-weight:500;color:var(--text);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* ENTRIES LIST */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;}
.entries-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;padding-right:4px;}
.entry-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;transition:border-color .15s;}
.entry-item:hover{border-color:var(--border2);}
.entry-info{display:flex;align-items:center;gap:10px;}
.entry-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.entry-type{font-size:13px;font-weight:500;}
.entry-time{font-family:var(--font-mono);font-size:12px;color:var(--text2);}
.entry-sync{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;}
.entry-synced{background:var(--green-bg);color:var(--green);}
.entry-pending{background:var(--amber-bg);color:var(--amber);}
.entry-manual-tag{font-size:10px;color:var(--accent);background:rgba(79,156,249,0.1);padding:2px 6px;border-radius:4px;margin-left:6px;}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.modal-overlay.active{display:flex;}
.modal-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-xl);width:100%;max-width:400px;animation:modalIn .25s cubic-bezier(0.16, 1, 0.3, 1);}
@keyframes modalIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:16px;}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:12px;}

.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:12px;color:var(--text2);font-weight:500;}
.form-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:10px 12px;font-size:14px;width:100%;}
.form-input:focus{border-color:var(--accent);}

.btn-primary{background:var(--accent);color:#fff;flex:1;padding:12px;border-radius:var(--radius);font-weight:600;}
.btn-secondary{background:var(--surface3);color:var(--text);flex:1;padding:12px;border-radius:var(--radius);font-weight:500;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:12px 20px;border-radius:var(--radius-lg);z-index:2000;box-shadow:0 10px 30px rgba(0,0,0,0.5);opacity:0;transition:all .3s;pointer-events:none;}

/* UTILS */
.scrollbar-thin::-webkit-scrollbar{width:4px;}
.scrollbar-thin::-webkit-scrollbar-track{background:transparent;}
.scrollbar-thin::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>
<div id="app">
  <nav class="nav">
    <div class="nav-logo">
      <div class="dot" id="navDot"></div>
      PontoApp
    </div>
    <div class="nav-tabs">
      <button class="tab-btn active" onclick="setView('clock')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Início</span>
      </button>
      <button class="tab-btn" onclick="setView('reports')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="nav-icon"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Ajustes</span>
      </button>
    </div>
    <div class="sync-badge" id="syncBadge">
      <span class="dot" style="width:6px;height:6px;border-radius:50%;background:var(--text3)"></span>
      offline
    </div>

  <!-- CLOCK VIEW -->
  <div class="view active" id="view-clock">

  <!-- REPORTS VIEW -->

  <div id="toast"></div>

<script>
// ─── CONFIGURAÇÃO SUPABASE ──────────────────────────────────────────────────
let sbClient = null;

const Config = {
  save(url, key) {
    localStorage.setItem('sb_url', url);
    localStorage.setItem('sb_key', key);
    this.init();
  },
  init() {
    // Valores padrão fornecidos pelo usuário
    const defaultUrl = 'https://pbvatzdzyuarqeqcfitf.supabase.co';
    const defaultKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBidmF0emR6eXVhcnFlcWNmaXRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjkzNTUsImV4cCI6MjA5NDQ0NTM1NX0.2wu0T96z9vZ7cdEPro01Vjmn2xdnE3US_ltsA3lXXM4';

    const url = localStorage.getItem('sb_url') || defaultUrl;
    const key = localStorage.getItem('sb_key') || defaultKey;
    if (url && key && window.supabase) {
      sbClient = window.supabase.createClient(url, key);
      console.log("Supabase inicializado");
      Sync.start();
    }
    if (document.getElementById('sbUrl')) {
      document.getElementById('sbUrl').value = url || '';
      document.getElementById('sbKey').value = key || '';
    }
  }
};

function saveConfig() {
  const url = document.getElementById('sbUrl').value;
  const key = document.getElementById('sbKey').value;
  Config.save(url, key);
  showToast("Configurações salvas!");
}

// ─── STORAGE (LOCAL FIRST) ──────────────────────────────────────────────────
const Storage = {
  getEntries() { return JSON.parse(localStorage.getItem('entries') || '[]'); },
  saveEntries(e) { localStorage.setItem('entries', JSON.stringify(e)); },
  getSession() { return JSON.parse(localStorage.getItem('session') || 'null'); },
  saveSession(s) { localStorage.setItem('session', JSON.stringify(s)); },
  clearSession() { localStorage.removeItem('session'); }
};

// ─── SYNC LOGIC ─────────────────────────────────────────────────────────────
const Sync = {
  isOnline: navigator.onLine,
  timer: null,
  
  start() {
    if (this.timer) clearInterval(this.timer);
    this.timer = setInterval(() => this.process(), 5000);
    this.process();
  },

  async process() {
    if (!sbClient || !this.isOnline) return;
    
    const entries = Storage.getEntries();
    const pending = entries.filter(e => e.syncStatus === 'pending');
    
    if (pending.length === 0) return;

    for (const entry of pending) {
      try {
        const { error } = await sbClient.from('entries').upsert({
          client_id: entry.id,
          timestamp: entry.timestamp,
          type: entry.type,
          duration: entry.duration || 0,
          manual: entry.manual || false
        }, { onConflict: 'client_id' });

        if (!error || error.code === '23505') { // 23505 é o código do Postgres para Unique Violation
          entry.syncStatus = 'synced';
          console.log("Sincronizado:", entry.id);
        } else {
          console.error("Erro sync:", error);
        }
      } catch (err) {
        console.error("Falha na rede durante sync");
      }
    }
    
    Storage.saveEntries(entries);
    UI.updateStats();
    UI.renderEntries();
  }
};

window.addEventListener('online', () => { 
  Sync.isOnline = true; 
  UI.updateSyncBadge();
  Sync.process();
});
window.addEventListener('offline', () => { 
  Sync.isOnline = false; 
  UI.updateSyncBadge();
});

// ─── PUNCH CLOCK LOGIC ──────────────────────────────────────────────────────
const Punch = {
  toggle() {
    const session = Storage.getSession();
    const entries = Storage.getEntries();
    const now = new Date();

    if (!session) {
      // ENTRADA
      const newEntry = {
        id: 'lc-' + Date.now(),
        timestamp: now.toISOString(),
        type: 'entrada',
        syncStatus: 'pending',
        manual: false
      };
      entries.push(newEntry);
      Storage.saveEntries(entries);
      Storage.saveSession({ startId: newEntry.id, startTime: newEntry.timestamp });
      showToast("Entrada registrada!");
    } else {
      // SAÍDA
      const duration = now.getTime() - new Date(session.startTime).getTime();
      const newEntry = {
        id: 'lc-' + Date.now(),
        timestamp: now.toISOString(),
        type: 'saida',
        duration: duration,
        syncStatus: 'pending',
        manual: false
      };
      entries.push(newEntry);
      Storage.saveEntries(entries);
      Storage.clearSession();
      showToast("Saída registrada!");
    }
    UI.updateStats();
    UI.renderEntries();
    Sync.process();
  }
};

// ─── MANUAL ENTRY ───────────────────────────────────────────────────────────
function openManualModal() {
  document.getElementById('manualDate').valueAsDate = new Date();
  document.getElementById('manualModal').classList.add('active');
}

function closeManualModal() {
  document.getElementById('manualModal').classList.remove('active');
}

function saveManualEntry() {
  const date = document.getElementById('manualDate').value;
  const timeIn = document.getElementById('manualIn').value;
  const timeOut = document.getElementById('manualOut').value;

  if (!date || !timeIn || !timeOut) {
    showToast("Preencha todos os campos!");
    return;
  }

  const start = new Date(`${date}T${timeIn}`);
  const end = new Date(`${date}T${timeOut}`);

  if (end <= start) {
    showToast("Saída deve ser após a entrada!");
    return;
  }

  const duration = end.getTime() - start.getTime();
  const entries = Storage.getEntries();

  // Criar entrada e saída manuais
  const idIn = 'man-in-' + Date.now();
  const idOut = 'man-out-' + Date.now();

  entries.push({
    id: idIn,
    timestamp: start.toISOString(),
    type: 'entrada',
    syncStatus: 'pending',
    manual: true
  });

  entries.push({
    id: idOut,
    timestamp: end.toISOString(),
    type: 'saida',
    duration: duration,
    syncStatus: 'pending',
    manual: true
  });

  Storage.saveEntries(entries);
  closeManualModal();
  showToast("Registro manual salvo!");
  UI.updateStats();
  UI.renderEntries();
  Sync.process();
}

// ─── UI CONTROLLER ──────────────────────────────────────────────────────────
const UI = {
  init() {
    setInterval(() => this.updateClock(), 1000);
    this.updateClock();
    this.updateSyncBadge();
    this.updateStats();
    this.renderEntries();
    
    // Setup report dates
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('reportStart').value = today.substring(0, 8) + '01';
    document.getElementById('reportEnd').value = today;
  },

  updateClock() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent = now.toLocaleTimeString('pt-BR');
    document.getElementById('clockDate').textContent = now.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long' });
    
    // Update active session timer
    const session = Storage.getSession();
    if (session) {
      const diff = Date.now() - new Date(session.startTime).getTime();
      document.getElementById('sessionTimer').textContent = this.fmtHMS(diff);
      document.getElementById('sessionLabel').textContent = "Trabalhando agora";
      document.getElementById('btnPunch').classList.add('running');
      document.getElementById('punchLabel').textContent = "Bater Saída";
      document.getElementById('pulse').classList.add('active');
    } else {
      document.getElementById('sessionTimer').textContent = "";
      document.getElementById('sessionLabel').textContent = "";
      document.getElementById('btnPunch').classList.remove('running');
      document.getElementById('punchLabel').textContent = "Bater Ponto";
      document.getElementById('pulse').classList.remove('active');
    }
  },

  updateSyncBadge() {
    const badge = document.getElementById('syncBadge');
    if (Sync.isOnline) {
      badge.innerHTML = '<span style="width:6px;height:6px;border-radius:50%;background:var(--green)"></span> online';
      badge.style.color = 'var(--green)';
    } else {
      badge.innerHTML = '<span style="width:6px;height:6px;border-radius:50%;background:var(--amber)"></span> offline';
      badge.style.color = 'var(--amber)';
    }
  },

  updateStats() {
    const entries = Storage.getEntries();
    const todayStr = new Date().toLocaleDateString('pt-BR');
    
    const todayEntries = entries.filter(e => new Date(e.timestamp).toLocaleDateString('pt-BR') === todayStr);
    const todayMs = todayEntries.reduce((acc, e) => acc + (e.duration || 0), 0);
    
    document.getElementById('statToday').textContent = this.fmtHM(todayMs);
    document.getElementById('statTodayEntries').textContent = `${todayEntries.length} registros`;
    
    const pending = entries.filter(e => e.syncStatus === 'pending').length;
    document.getElementById('statPending').textContent = pending;
  },

  renderEntries() {
    const entries = Storage.getEntries();
    const todayStr = new Date().toLocaleDateString('pt-BR');
    const list = document.getElementById('entriesList');
    
    const today = entries
      .filter(e => new Date(e.timestamp).toLocaleDateString('pt-BR') === todayStr)
      .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

    if (today.length === 0) {
      list.innerHTML = '<div class="empty-state" style="text-align:center;padding:30px;color:var(--text3)">Nenhum registro hoje</div>';
      return;
    }

    list.innerHTML = today.map(e => `
      <div class="entry-item">
        <div class="entry-info">
          <div class="entry-dot" style="background:${e.type === 'entrada' ? 'var(--green)' : 'var(--red)'}"></div>
          <div>
            <div class="entry-type">${e.type === 'entrada' ? 'Entrada' : 'Saída'} ${e.manual ? '<span class="entry-manual-tag">manual</span>' : ''}</div>
            <div class="entry-time">${new Date(e.timestamp).toLocaleTimeString('pt-BR')}</div>
          </div>
        </div>
        <div class="entry-sync ${e.syncStatus === 'synced' ? 'entry-synced' : 'entry-pending'}">
          ${e.syncStatus === 'synced' ? 'sincronizado' : 'pendente'}
        </div>
      </div>
    `).join('');
  },

  fmtHMS(ms) {
    const s = Math.floor(ms / 1000) % 60;
    const m = Math.floor(ms / 60000) % 60;
    const h = Math.floor(ms / 3600000);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },

  fmtHM(ms) {
    const m = Math.floor(ms / 60000) % 60;
    const h = Math.floor(ms / 3600000);
    return `${h}h ${String(m).padStart(2,'0')}m`;
  }
};

function setView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.bottom = '34px';
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.bottom = '24px';
  }, 3000);
}

function clearData() {
  if(confirm("Deseja apagar todos os dados locais?")) {
    localStorage.clear();
    location.reload();
  }
}

// ─── RELATÓRIOS ─────────────────────────────────────────────────────────────
function generateReport() {
  const start = new Date(document.getElementById('reportStart').value + 'T00:00:00');
  const end = new Date(document.getElementById('reportEnd').value + 'T23:59:59');
  const entries = Storage.getEntries();
  
  const filtered = entries.filter(e => {
    const d = new Date(e.timestamp);
    return d >= start && d <= end;
  });

  const out = document.getElementById('reportOutput');
  if (filtered.length === 0) {
    out.innerHTML = "<p style='text-align:center; padding:20px; color:var(--text3)'>Nenhum dado no período.</p>";
    return;
  }

  // Agrupar por dia
  const days = {};
  filtered.forEach(e => {
    const day = new Date(e.timestamp).toLocaleDateString('pt-BR');
    if (!days[day]) days[day] = { total: 0, entries: [] };
    days[day].entries.push(e);
    days[day].total += (e.duration || 0);
  });

  let html = `<div class="stat-card" style="margin-top:16px">`;
  for (const day in days) {
    html += `
      <div style="padding:10px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div style="font-weight:500">${day}</div>
          <div style="font-size:11px; color:var(--text3)">${days[day].entries.length} registros</div>
        </div>
        <div style="font-family:var(--font-mono); font-weight:600; color:var(--green)">${UI.fmtHM(days[day].total)}</div>
      </div>
    `;
  }
  html += `</div>`;
  out.innerHTML = html;
}

// ─── INICIALIZAÇÃO ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  UI.init();
  Config.init();

  // Registrar Service Worker para PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log("Service Worker registrado"))
      .catch(err => console.error("Erro Service Worker", err));
  }
});

function togglePunch() { Punch.toggle(); }
</script>
