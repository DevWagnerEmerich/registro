<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PontoApp Premium</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0f14;--surface:#161a23;--surface2:#1e2330;--surface3:#252b3b;
  --border:#2a3042;--border2:#3a4258;
  --text:#e8eaf0;--text2:#8892a4;--text3:#5a6478;
  --accent:#4f9cf9;--accent2:#3d7fd4;--accent-glow:rgba(79,156,249,0.15);
  --green:#34c975;--green-bg:rgba(52,201,117,0.1);--green-border:rgba(52,201,117,0.3);
  --red:#f05252;--red-bg:rgba(240,82,82,0.1);--red-border:rgba(240,82,82,0.3);
  --amber:#f0a830;--amber-bg:rgba(240,168,48,0.1);
  --radius:12px;--radius-lg:18px;--radius-xl:24px;
  --font-main:'Sora',sans-serif;--font-mono:'DM Mono',monospace;
  --glass: rgba(22, 26, 35, 0.9);
}
body{
    background:var(--bg);color:var(--text);font-family:var(--font-main);
    min-height:100vh;font-size:14px;line-height:1.6;overflow-x:hidden;
    padding-bottom:120px;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    color-scheme: dark; /* Força os ícones de data/hora a ficarem brancos */
}
#app{display:flex;flex-direction:column;max-width:500px;margin:0 auto;padding:0 20px;}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:24px 0;margin-bottom:10px;padding-top:env(safe-area-inset-top, 24px);}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:600;letter-spacing:-0.03em;}
.nav-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);}

.nav-tabs{
    display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;
    background:var(--surface); /* Fundo sólido para não conflitar com rolagem */
    border-top:1px solid var(--border);
    border-left:1px solid var(--border); border-right:1px solid var(--border);
    padding:12px 24px calc(12px + env(safe-area-inset-bottom));
    z-index:900;justify-content:space-around;
}
.tab-btn{flex:1;background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px 0;transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);}
.tab-btn svg { transition: transform 0.3s; }
.tab-btn.active{color:var(--accent);}
.tab-btn.active svg { transform: translateY(-2px); color: var(--accent); }

.sync-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;display:flex;align-items:center;gap:6px;background: var(--surface2);}

/* VIEWS */
.view{display:none;}
.view.active{display:block;animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);}
@keyframes slideUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

/* CLOCK */
.clock-hero{text-align:center;padding:30px 0;}
.clock-display{font-family:var(--font-mono);font-size:68px;font-weight:500;letter-spacing:-0.04em;color:var(--text);line-height:1;margin-bottom:8px;}
.clock-date{font-size:14px;color:var(--text2);text-transform:capitalize;font-weight:400;}

.btn-punch-wrap{display:flex;flex-direction:column;align-items:center;gap:24px;margin-bottom:40px;}
.btn-punch{
    width:180px;height:180px;border-radius:50%;background:linear-gradient(145deg, var(--surface2), var(--surface));
    border:2px solid var(--border);color:var(--text);font-size:16px;font-weight:600;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 15px rgba(255,255,255,0.03);
}
.btn-punch:active{transform:scale(0.94); background: var(--surface3);}
.btn-punch.running{border-color:var(--red);background:linear-gradient(145deg, rgba(240,82,82,0.15), var(--surface2));box-shadow: 0 0 25px rgba(240,82,82,0.2);}
.btn-punch svg{width:36px;height:36px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;transition: 0.3s;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;font-weight:600;}
.stat-value{font-family:var(--font-mono);font-size:22px;font-weight:600;}

/* LIST */
.entry-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.entry-info{display:flex;align-items:center;gap:14px;}
.entry-dot{width:10px;height:10px;border-radius:50%;}
.btn-delete{background:transparent;color:var(--text3);padding:10px;border-radius:50%;}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:none;align-items:flex-end;justify-content:center;z-index:1000;padding:0;}
.modal-overlay.active{display:flex;}
.modal-card{background:var(--surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;width:100%;max-width:500px;animation: slideInBottom 0.3s cubic-bezier(0.16, 1, 0.3, 1);}
@keyframes slideInBottom { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header{padding:24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:24px;display:flex;flex-direction:column;gap:20px;}
.modal-footer{padding:20px 24px calc(24px + env(safe-area-inset-bottom));display:flex;gap:14px;}

/* INPUTS */
.form-input{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:14px;font-size:16px;width:100%;-webkit-appearance:none;transition:0.3s;outline:none;}
.form-input:focus{border-color:var(--accent);background:rgba(255,255,255,0.06);}
.btn-primary{background:var(--accent);color:#fff;padding:16px;border-radius:var(--radius);font-weight:600;width:100%;font-size:15px;border:none;cursor:pointer;}
.btn-secondary{background:var(--surface3);color:var(--text);padding:16px;border-radius:var(--radius);font-weight:600;width:100%;font-size:15px;border:none;cursor:pointer;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;}

/* TOAST */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:30px;z-index:2000;font-weight:600;font-size:13px;box-shadow:0 10px 30px var(--accent-glow);opacity:0;transition:0.4s cubic-bezier(0.16, 1, 0.3, 1);pointer-events:none;}

.print-only { display: none !important; }
@media print {
  body * { visibility: hidden; display: none !important; }
  #reportPrintArea, #reportPrintArea * { visibility: visible; display: block !important; }
  #reportPrintArea { position: absolute; left: 0; top: 0; width: 100%; color: #000; background: #fff; padding: 40px; font-family: sans-serif; }
  .print-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
  .no-print { display: none !important; }
}
</style>
</head>
<body>

<div id="app">
  <nav class="nav">
    <div class="nav-logo"><div class="dot"></div>PontoApp</div>
    <div id="syncBadge" class="sync-badge">offline</div>
  </nav>

  <div class="nav-tabs">
    <button class="tab-btn active" id="tab-clock" onclick="setView('clock')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Início</span>
    </button>
    <button class="tab-btn" id="tab-reports" onclick="setView('reports')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>Relatórios</span>
    </button>
    <button class="tab-btn" id="tab-settings" onclick="setView('settings')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Dados</span>
    </button>
  </div>

  <!-- CLOCK VIEW -->
  <div class="view active" id="view-clock">
    <div class="clock-hero">
      <div class="clock-display" id="clockDisplay">00:00:00</div>
      <div class="clock-date" id="clockDate">—</div>
    </div>

    <div class="btn-punch-wrap">
      <button class="btn-punch" id="btnPunch" onclick="togglePunch()">
        <svg id="punchIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="punchLabel">Bater Ponto</span>
      </button>
      <button class="btn-outline" onclick="openManualModal()">+ Lançamento Manual</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Hoje</div>
        <div class="stat-value" id="statToday">0h 00m</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total do Mês</div>
        <div class="stat-value" id="statMonth" style="color: var(--accent);">0h 00m</div>
      </div>
    </div>

    <h4 style="font-size:12px; color:var(--text3); margin-bottom:16px; text-transform:uppercase; letter-spacing: 0.1em; font-weight:700;">Registros Recentes</h4>
    <div id="entriesList"></div>
  </div>

  <!-- REPORTS VIEW -->
  <div class="view" id="view-reports">
    <div class="stat-card" style="margin-bottom:24px;">
      <div class="modal-body" style="padding:0;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
          <div class="form-group">
            <label class="form-label">Data Início</label>
            <input type="date" id="reportStart" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Data Fim</label>
            <input type="date" id="reportEnd" class="form-input">
          </div>
        </div>
        <button class="btn-primary" style="margin-top:16px;" onclick="generateReport()">Gerar Relatório Completo</button>
      </div>
    </div>
    <div id="reportOutput"></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div class="view" id="view-settings">
    <div class="stat-card">
      <div class="stat-label">Gerenciamento</div>
      <p style="font-size:13px; color:var(--text3); margin-bottom:24px;">Os dados são salvos localmente e sincronizados na nuvem. Você pode limpar o cache local para reiniciar o app.</p>
      <button class="btn-secondary" style="color:var(--red); border: 1px solid var(--red-border);" onclick="clearData()">Limpar Cache Local</button>
      
      <div style="margin-top:48px; opacity: 0.2; pointer-events: none; filter: grayscale(1);">
         <div class="stat-label">Configuração de Conexão</div>
         <div class="form-group"><input type="text" id="sbUrl" class="form-input" disabled></div>
         <div class="form-group" style="margin-top:10px;"><input type="password" id="sbKey" class="form-input" disabled></div>
      </div>
    </div>
  </div>

  <!-- MANUAL MODAL -->
  <div class="modal-overlay" id="manualModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 style="font-size:17px; font-weight:600;">Novo Lançamento</h3>
        <button onclick="closeManualModal()" style="background:transparent; color:var(--text3); font-size:22px; padding: 5px;">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Dia do Registro</label>
          <input type="date" id="manualDate" class="form-input">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
          <div class="form-group">
            <label class="form-label">Horário Entrada</label>
            <input type="time" id="manualIn" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Horário Saída</label>
            <input type="time" id="manualOut" class="form-input">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeManualModal()">Cancelar</button>
        <button class="btn-primary" onclick="saveManualEntry()">Salvar Registro</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<div id="reportPrintArea" class="print-only"></div>

<script>
let sbClient = null;
const DEFAULTS = {
  url: 'https://pbvatzdzyuarqeqcfitf.supabase.co',
  key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBidmF0emR6eXVhcnFlcWNmaXRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjkzNTUsImV4cCI6MjA5NDQ0NTM1NX0.2wu0T96z9vZ7cdEPro01Vjmn2xdnE3US_ltsA3lXXM4'
};

const haptic = () => { if(navigator.vibrate) navigator.vibrate(10); };

const Storage = {
  get() { return JSON.parse(localStorage.getItem('entries') || '[]'); },
  save(e) { localStorage.setItem('entries', JSON.stringify(e)); },
  getSess() { return JSON.parse(localStorage.getItem('session') || 'null'); },
  saveSess(s) { localStorage.setItem('session', JSON.stringify(s)); }
};

const Config = {
  init() {
    const url = localStorage.getItem('sb_url') || DEFAULTS.url;
    const key = localStorage.getItem('sb_key') || DEFAULTS.key;
    if (window.supabase) {
      sbClient = window.supabase.createClient(url, key);
      Sync.start();
    }
    document.getElementById('sbUrl').value = url;
    document.getElementById('sbKey').value = key;
  }
};

const Sync = {
  active: false,
  start() {
    if (this.active) return;
    this.active = true;
    setInterval(() => this.process(), 5000);
    this.process();
  },
  async process() {
    if (!sbClient || !navigator.onLine) return;
    const entries = Storage.get();
    const pending = entries.filter(e => e.sync === 'pending');
    for (const e of pending) {
      try {
        const { error } = await sbClient.from('entries').upsert({
          client_id: e.id,
          timestamp: e.timestamp,
          type: e.type,
          duration: e.duration || 0,
          manual: e.manual || false
        }, { onConflict: 'client_id' });
        if (!error || error.code === '23505') e.sync = 'synced';
      } catch (err) {}
    }
    Storage.save(entries);
    UI.update();
  },
  async deleteFromRemote(id) {
    if (!sbClient || !navigator.onLine) return;
    await sbClient.from('entries').delete().eq('client_id', id);
  }
};

const UI = {
  updateData() {
    const entries = Storage.get();
    const now = new Date();
    const today = now.toLocaleDateString('pt-BR');
    const monthYear = now.toLocaleDateString('pt-BR', { month: '2-digit', year: 'numeric' });
    
    const todayMs = entries
      .filter(e => new Date(e.timestamp).toLocaleDateString('pt-BR') === today)
      .reduce((acc, e) => acc + (e.duration || 0), 0);
    document.getElementById('statToday').textContent = this.fmtHM(todayMs);

    let totalMonth = 0;
    entries.forEach(e => {
        const d = new Date(e.timestamp);
        if (d.toLocaleDateString('pt-BR', { month: '2-digit', year: 'numeric' }) === monthYear) {
            totalMonth += (e.duration || 0);
        }
    });
    document.getElementById('statMonth').textContent = this.fmtHM(totalMonth);

    const list = document.getElementById('entriesList');
    const recentEntries = entries
      .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))
      .slice(0, 10);
    
    list.innerHTML = recentEntries.length ? recentEntries.map(e => {
      const dt = new Date(e.timestamp);
      const isToday = dt.toLocaleDateString('pt-BR') === today;
      const dateLabel = isToday ? 'Hoje' : dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
      
      return `
        <div class="entry-item">
          <div class="entry-info">
            <div class="entry-dot" style="background:${e.type==='entrada'?'var(--green)':'var(--red)'}"></div>
            <div>
              <div style="font-weight:600; font-size:14px;">${e.type==='entrada'?'Entrada':'Saída'} ${e.manual?'<span style="color:var(--accent); font-size:10px; font-weight:700; margin-left:4px; border:1px solid var(--accent); padding:1px 4px; border-radius:4px;">MANUAL</span>':''}</div>
              <div style="font-size:12px; color:var(--text3); font-weight:500;">${dateLabel} às ${dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</div>
            </div>
          </div>
          <button class="btn-delete" onclick="deleteEntry('${e.id}')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      `;
    }).join('') : '<p style="text-align:center; padding:30px; color:var(--text3); font-weight:500;">Nenhum registro encontrado</p>';

    const sess = Storage.getSess();
    const btn = document.getElementById('btnPunch');
    const lbl = document.getElementById('punchLabel');
    const icon = document.getElementById('punchIcon');
    if (sess) {
      btn.classList.add('running');
      lbl.textContent = "Bater Saída";
      icon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2"/>';
    } else {
      btn.classList.remove('running');
      lbl.textContent = "Bater Ponto";
      icon.innerHTML = '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>';
    }

    const badge = document.getElementById('syncBadge');
    badge.textContent = navigator.onLine ? 'online' : 'offline';
    badge.style.color = navigator.onLine ? 'var(--green)' : 'var(--amber)';
  },
  updateClock() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent = now.toLocaleTimeString('pt-BR');
    document.getElementById('clockDate').textContent = now.toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'});
  },
  fmtHM(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    return `${h}h ${String(m).padStart(2,'0')}m`;
  }
};

function togglePunch() {
  haptic();
  const sess = Storage.getSess();
  const entries = Storage.get();
  const now = new Date();
  if (!sess) {
    const e = { id: 'p-'+Date.now(), timestamp: now.toISOString(), type: 'entrada', sync: 'pending', manual: false };
    entries.push(e);
    Storage.saveSess({ id: e.id, time: e.timestamp });
    showToast("Entrada Registrada!");
  } else {
    const dur = now.getTime() - new Date(sess.time).getTime();
    entries.push({ id: 'p-'+Date.now(), timestamp: now.toISOString(), type: 'saida', duration: dur, sync: 'pending', manual: false });
    Storage.saveSess(null);
    showToast("Saída Registrada!");
  }
  Storage.save(entries);
  UI.updateData();
  Sync.process();
}

function deleteEntry(id) {
  haptic();
  if (!confirm("Deseja realmente excluir este registro?")) return;
  let entries = Storage.get();
  entries = entries.filter(e => e.id !== id);
  Storage.save(entries);
  Sync.deleteFromRemote(id);
  UI.updateData();
  showToast("Registro excluído");
}

function openManualModal() {
  haptic();
  document.getElementById('manualDate').valueAsDate = new Date();
  document.getElementById('manualModal').classList.add('active');
}
function closeManualModal() { document.getElementById('manualModal').classList.remove('active'); }

function saveManualEntry() {
  haptic();
  const date = document.getElementById('manualDate').value;
  const tIn = document.getElementById('manualIn').value;
  const tOut = document.getElementById('manualOut').value;
  if (!date || !tIn || !tOut) return showToast("Preencha todos os campos");
  
  const start = new Date(`${date}T${tIn}:00`);
  const end = new Date(`${date}T${tOut}:00`);
  if (end <= start) return showToast("Horário inválido");

  const entries = Storage.get();
  const baseId = Date.now();
  entries.push({ id: 'm-i-'+baseId, timestamp: start.toISOString(), type: 'entrada', sync: 'pending', manual: true });
  entries.push({ id: 'm-o-'+baseId, timestamp: end.toISOString(), type: 'saida', duration: end.getTime()-start.getTime(), sync: 'pending', manual: true });
  
  Storage.save(entries);
  closeManualModal();
  UI.updateData();
  Sync.process();
  showToast("Lançamento Manual Salvo!");
}

function generateReport() {
  haptic();
  const startStr = document.getElementById('reportStart').value;
  const endStr = document.getElementById('reportEnd').value;
  if (!startStr || !endStr) return showToast("Selecione o período");
  
  const start = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr + 'T23:59:59');
  
  const entries = Storage.get();
  const filtered = entries.filter(e => {
    const d = new Date(e.timestamp);
    return d >= start && d <= end;
  });

  const days = {};
  filtered.forEach(e => {
    const d = new Date(e.timestamp).toLocaleDateString('pt-BR');
    if (!days[d]) days[d] = { total: 0, entries: [] };
    days[d].entries.push(e);
    days[d].total += (e.duration || 0);
  });

  let totalPeriod = 0;
  let html = `<div class="stat-card" style="margin-top:10px; animation: slideUp 0.4s ease;">`;
  html += `<div style="display:flex; justify-content:space-between; margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:12px;">
    <span style="font-weight:600; color:var(--text2);">Resumo Gerado</span>
    <button class="btn-outline" style="border-color:var(--green); color:var(--green);" onclick="printReport()">Exportar PDF</button>
  </div>`;

  for (const d in days) {
    totalPeriod += days[d].total;
    
    // Lista detalhada para a tela
    const screenEntryList = days[d].entries
      .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
      .map(e => {
        const timeStr = new Date(e.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        const typeStr = e.type === 'entrada' ? 'Entrada' : 'Saída';
        const manualStr = e.manual ? ' <span style="color:var(--accent);font-size:10px;">(Manual)</span>' : '';
        return `<div style="font-size:13px; color:var(--text2); margin-top:4px;">• ${timeStr} - ${typeStr}${manualStr}</div>`;
      }).join('');

    html += `<div style="display:flex; flex-direction:column; padding:14px 0; border-bottom:1px solid var(--border2);">
      <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
        <span style="font-size:15px; font-weight:600; color:var(--text);">${d}</span>
        <span style="font-family:var(--font-mono); font-weight:600; color:var(--text);">${UI.fmtHM(days[d].total)}</span>
      </div>
      <div style="padding-left: 8px; border-left: 2px solid var(--border);">${screenEntryList}</div>
    </div>`;
  }
  html += `<div style="margin-top:20px; text-align:right; font-size:18px; font-weight:700; color:var(--accent);">Total: ${UI.fmtHM(totalPeriod)}</div>`;
  html += `</div>`;
  
  document.getElementById('reportOutput').innerHTML = html;

  let printHtml = `<h1 style="text-align:center; margin-bottom:10px;">Relatório de Horas</h1><p style="text-align:center;">Período: ${start.toLocaleDateString()} a ${end.toLocaleDateString()}</p><hr style="margin:20px 0;">`;
  for (const d in days) {
    const entryListHtml = days[d].entries
      .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
      .map(e => {
        const timeStr = new Date(e.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        const typeStr = e.type === 'entrada' ? 'ENT' : 'SAI';
        const manualStr = e.manual ? '*' : '';
        const color = e.type === 'entrada' ? '#15803d' : '#b91c1c';
        const bg = e.type === 'entrada' ? '#dcfce7' : '#fee2e2';
        return `<span style="display:inline-block; font-size:11px; font-family:sans-serif; color:${color}; background:${bg}; padding:4px 8px; border-radius:4px; border:1px solid ${color}; margin-right:6px; margin-bottom:6px;"><b>${timeStr}</b> ${typeStr}${manualStr}</span>`;
      }).join('');
      
    printHtml += `
      <div style="margin-bottom: 15px; page-break-inside: avoid;">
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px; border-bottom: 2px solid #eee; padding-bottom: 4px; margin-bottom: 8px;">
          <span>📅 ${d}</span>
          <span>⏳ ${UI.fmtHM(days[d].total)}</span>
        </div>
        <div style="display:block; line-height:2;">
          ${entryListHtml}
        </div>
      </div>
    `;
  }
  printHtml += `<hr style="margin:20px 0;"><h2 style="text-align:right;">Total Acumulado: ${UI.fmtHM(totalPeriod)}</h2>`;
  document.getElementById('reportPrintArea').innerHTML = printHtml;
}

function printReport() { haptic(); window.print(); }
function setView(name) {
  haptic();
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}
function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 3000);
}
function clearData() { haptic(); if(confirm("Atenção: Isso apagará todos os dados locais. O Supabase continuará com os dados sincronizados. Continuar?")) { localStorage.clear(); location.reload(); } }

document.addEventListener('DOMContentLoaded', () => {
    Config.init();
    setView('clock');
    UI.updateData();
    UI.updateClock();
    setInterval(() => UI.updateClock(), 1000);
});

window.addEventListener('online', () => UI.updateData());
window.addEventListener('offline', () => UI.updateData());
</script>
