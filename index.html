<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PontoApp Premium</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#161a23;--surface2:#1e2330;--surface3:#252b3b;
  --border:#2a3042;--border2:#3a4258;
  --text:#e8eaf0;--text2:#8892a4;--text3:#5a6478;
  --accent:#4f9cf9;--accent2:#3d7fd4;--accent-glow:rgba(79,156,249,0.15);
  --green:#34c975;--green-bg:rgba(52,201,117,0.1);--green-border:rgba(52,201,117,0.3);
  --red:#f05252;--red-bg:rgba(240,82,82,0.1);--red-border:rgba(240,82,82,0.3);
  --amber:#f0a830;--amber-bg:rgba(240,168,48,0.1);
  --radius:12px;--radius-lg:18px;--radius-xl:24px;
  --font-main:'Sora',sans-serif;--font-mono:'DM Mono',monospace;
  --glass: rgba(22, 26, 35, 0.85);
}
body{background:var(--bg);color:var(--text);font-family:var(--font-main);min-height:100vh;font-size:14px;line-height:1.6;overflow-x:hidden;padding-bottom:100px;}
h1,h2,h3,h4{font-weight:500;letter-spacing:-0.02em;}
button{font-family:var(--font-main);cursor:pointer;border:none;outline:none;transition:all .2s;}
input,select,textarea{font-family:var(--font-main);outline:none;}

#app{display:flex;flex-direction:column;max-width:500px;margin:0 auto;padding:0 16px;}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:24px;}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:600;letter-spacing:-0.03em;}
.nav-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);}
.nav-tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--glass);backdrop-filter:blur(15px);border-top:1px solid var(--border);padding:12px 20px env(safe-area-inset-bottom);z-index:900;justify-content:space-around;}
.tab-btn{flex:1;background:transparent;color:var(--text2);font-size:11px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;}
.tab-btn.active{color:var(--accent);}
.sync-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;display:flex;align-items:center;gap:5px;}

/* VIEWS */
.view{display:none;animation:fadeIn .3s ease-out;}
.view.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* CLOCK */
.clock-hero{text-align:center;padding:40px 0 30px;}
.clock-display{font-family:var(--font-mono);font-size:64px;font-weight:500;letter-spacing:-0.03em;color:var(--text);line-height:1;margin-bottom:8px;}
.clock-date{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;}

.btn-punch-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;margin-bottom:40px;}
.btn-punch{width:180px;height:180px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);color:var(--text);font-size:16px;font-weight:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow: 0 15px 40px rgba(0,0,0,0.3);}
.btn-punch:active{transform:scale(0.96);}
.btn-punch.running{border-color:var(--red);background:rgba(240,82,82,0.1);}
.btn-punch svg{width:32px;height:32px;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:30px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;position:relative;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.stat-value{font-family:var(--font-mono);font-size:20px;font-weight:600;}

/* LIST */
.entry-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.entry-info{display:flex;align-items:center;gap:12px;}
.entry-dot{width:8px;height:8px;border-radius:50%;}
.btn-delete{background:transparent;color:var(--text3);padding:8px;border-radius:50%;}
.btn-delete:hover{color:var(--red);background:var(--red-bg);}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.modal-overlay.active{display:flex;}
.modal-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-xl);width:100%;max-width:400px;overflow:hidden;}
.modal-header{padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:16px;}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:12px;}

/* INPUTS */
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:12px;color:var(--text2);font-weight:500;}
.form-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:12px;font-size:15px;width:100%;}

.btn-primary{background:var(--accent);color:#fff;padding:14px;border-radius:var(--radius);font-weight:600;width:100%;}
.btn-secondary{background:var(--surface3);color:var(--text);padding:14px;border-radius:var(--radius);font-weight:500;width:100%;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:8px 16px;border-radius:20px;font-size:12px;}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:12px 24px;border-radius:30px;z-index:2000;box-shadow:0 10px 30px rgba(0,0,0,0.5);opacity:0;transition:0.3s;pointer-events:none;}

@media print {
  body * { visibility: hidden; }
  #reportPrintArea, #reportPrintArea * { visibility: visible; }
  #reportPrintArea { position: absolute; left: 0; top: 0; width: 100%; color: #000; background: #fff; padding: 20px; }
  .no-print { display: none !important; }
}
</style>
</head>
<body>

<div id="app">
  <nav class="nav">
    <div class="nav-logo"><div class="dot"></div>PontoApp</div>
    <div id="syncBadge" class="sync-badge">offline</div>
  </nav>

  <div class="nav-tabs">
    <button class="tab-btn active" onclick="setView('clock')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Início</span>
    </button>
    <button class="tab-btn" onclick="setView('reports')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>Relatórios</span>
    </button>
    <button class="tab-btn" onclick="setView('settings')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Ajustes</span>
    </button>
  </div>

  <!-- CLOCK VIEW -->
  <div class="view active" id="view-clock">
    <div class="clock-hero">
      <div class="clock-display" id="clockDisplay">00:00:00</div>
      <div class="clock-date" id="clockDate">—</div>
    </div>

    <div class="btn-punch-wrap">
      <button class="btn-punch" id="btnPunch" onclick="togglePunch()">
        <svg id="punchIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="punchLabel">Bater Ponto</span>
      </button>
      <button class="btn-outline" onclick="openManualModal()">+ Lançamento Manual</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Hoje</div>
        <div class="stat-value" id="statToday">0h 00m</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pendentes Sync</div>
        <div class="stat-value" id="statPending">0</div>
      </div>
    </div>

    <h4 style="font-size:13px; color:var(--text2); margin-bottom:12px; text-transform:uppercase;">Hoje</h4>
    <div id="entriesList"></div>
  </div>

  <!-- REPORTS VIEW -->
  <div class="view" id="view-reports">
    <div class="stat-card" style="margin-bottom:20px;">
      <div class="modal-body" style="padding:0;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
          <div class="form-group">
            <label class="form-label">Início</label>
            <input type="date" id="reportStart" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Fim</label>
            <input type="date" id="reportEnd" class="form-input">
          </div>
        </div>
        <button class="btn-primary" style="margin-top:10px;" onclick="generateReport()">Gerar Relatório</button>
      </div>
    </div>
    <div id="reportOutput"></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div class="view" id="view-settings">
    <div class="stat-card">
      <div class="stat-label">Avançado</div>
      <p style="font-size:12px; color:var(--text3); margin-bottom:15px;">Configurações de conexão e dados.</p>
      <div class="form-group" style="margin-bottom:10px;">
        <label class="form-label">Supabase URL</label>
        <input type="text" id="sbUrl" class="form-input">
      </div>
      <div class="form-group" style="margin-bottom:15px;">
        <label class="form-label">Anon Key</label>
        <input type="password" id="sbKey" class="form-input">
      </div>
      <button class="btn-secondary" onclick="saveConfig()">Salvar Configurações</button>
      <hr style="border:none; border-top:1px solid var(--border); margin:20px 0;">
      <button class="btn-secondary" style="color:var(--red);" onclick="clearData()">Limpar Tudo</button>
    </div>
  </div>

  <!-- MANUAL MODAL -->
  <div class="modal-overlay" id="manualModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 style="font-size:16px;">Novo Registro</h3>
        <button onclick="closeManualModal()" style="background:transparent; color:var(--text3); font-size:18px;">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Data</label>
          <input type="date" id="manualDate" class="form-input">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
          <div class="form-group">
            <label class="form-label">Entrada</label>
            <input type="time" id="manualIn" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Saída</label>
            <input type="time" id="manualOut" class="form-input">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeManualModal()">Cancelar</button>
        <button class="btn-primary" onclick="saveManualEntry()">Salvar</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<div id="reportPrintArea" style="display:none;"></div>

<script>
let sbClient = null;
const DEFAULTS = {
  url: 'https://pbvatzdzyuarqeqcfitf.supabase.co',
  key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBidmF0emR6eXVhcnFlcWNmaXRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NjkzNTUsImV4cCI6MjA5NDQ0NTM1NX0.2wu0T96z9vZ7cdEPro01Vjmn2xdnE3US_ltsA3lXXM4'
};

const Storage = {
  get() { return JSON.parse(localStorage.getItem('entries') || '[]'); },
  save(e) { localStorage.setItem('entries', JSON.stringify(e)); },
  getSess() { return JSON.parse(localStorage.getItem('session') || 'null'); },
  saveSess(s) { localStorage.setItem('session', JSON.stringify(s)); }
};

const Config = {
  init() {
    const url = localStorage.getItem('sb_url') || DEFAULTS.url;
    const key = localStorage.getItem('sb_key') || DEFAULTS.key;
    if (window.supabase) {
      sbClient = window.supabase.createClient(url, key);
      Sync.start();
    }
    document.getElementById('sbUrl').value = url;
    document.getElementById('sbKey').value = key;
  }
};

const Sync = {
  active: false,
  start() {
    if (this.active) return;
    this.active = true;
    setInterval(() => this.process(), 5000);
    this.process();
  },
  async process() {
    if (!sbClient || !navigator.onLine) return;
    const entries = Storage.get();
    const pending = entries.filter(e => e.sync === 'pending');
    for (const e of pending) {
      try {
        const { error } = await sbClient.from('entries').upsert({
          client_id: e.id,
          timestamp: e.timestamp,
          type: e.type,
          duration: e.duration || 0,
          manual: e.manual || false
        }, { onConflict: 'client_id' });
        if (!error || error.code === '23505') e.sync = 'synced';
      } catch (err) {}
    }
    Storage.save(entries);
    UI.update();
  },
  async deleteFromRemote(id) {
    if (!sbClient || !navigator.onLine) return;
    await sbClient.from('entries').delete().eq('client_id', id);
  }
};

const UI = {
  update() {
    const entries = Storage.get();
    const today = new Date().toLocaleDateString('pt-BR');
    
    // Stats Hoje
    const todayMs = entries
      .filter(e => new Date(e.timestamp).toLocaleDateString('pt-BR') === today)
      .reduce((acc, e) => acc + (e.duration || 0), 0);
    document.getElementById('statToday').textContent = this.fmtHM(todayMs);
    document.getElementById('statPending').textContent = entries.filter(e => e.sync === 'pending').length;

    // List Hoje
    const list = document.getElementById('entriesList');
    const todayEntries = entries
      .filter(e => new Date(e.timestamp).toLocaleDateString('pt-BR') === today)
      .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    
    list.innerHTML = todayEntries.length ? todayEntries.map(e => `
      <div class="entry-item">
        <div class="entry-info">
          <div class="entry-dot" style="background:${e.type==='entrada'?'var(--green)':'var(--red)'}"></div>
          <div>
            <div style="font-weight:600; font-size:13px;">${e.type==='entrada'?'Entrada':'Saída'} ${e.manual?'<small style="color:var(--accent); margin-left:4px;">manual</small>':''}</div>
            <div style="font-size:11px; color:var(--text3);">${new Date(e.timestamp).toLocaleTimeString('pt-BR')}</div>
          </div>
        </div>
        <button class="btn-delete" onclick="deleteEntry('${e.id}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    `).join('') : '<p style="text-align:center; padding:20px; color:var(--text3);">Nenhum registro hoje</p>';

    // Clock
    const now = new Date();
    document.getElementById('clockDisplay').textContent = now.toLocaleTimeString('pt-BR');
    document.getElementById('clockDate').textContent = now.toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'});

    const sess = Storage.getSess();
    const btn = document.getElementById('btnPunch');
    const lbl = document.getElementById('punchLabel');
    const icon = document.getElementById('punchIcon');
    if (sess) {
      btn.classList.add('running');
      lbl.textContent = "Bater Saída";
      icon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2"/>';
    } else {
      btn.classList.remove('running');
      lbl.textContent = "Bater Ponto";
      icon.innerHTML = '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>';
    }
    
    const badge = document.getElementById('syncBadge');
    badge.textContent = navigator.onLine ? 'online' : 'offline';
    badge.style.color = navigator.onLine ? 'var(--green)' : 'var(--amber)';
  },
  fmtHM(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    return `${h}h ${String(m).padStart(2,'0')}m`;
  }
};

function togglePunch() {
  const sess = Storage.getSess();
  const entries = Storage.get();
  const now = new Date();
  if (!sess) {
    const e = { id: 'p-'+Date.now(), timestamp: now.toISOString(), type: 'entrada', sync: 'pending', manual: false };
    entries.push(e);
    Storage.saveSess({ id: e.id, time: e.timestamp });
  } else {
    const dur = now.getTime() - new Date(sess.time).getTime();
    entries.push({ id: 'p-'+Date.now(), timestamp: now.toISOString(), type: 'saida', duration: dur, sync: 'pending', manual: false });
    Storage.saveSess(null);
  }
  Storage.save(entries);
  UI.update();
  Sync.process();
}

function deleteEntry(id) {
  if (!confirm("Excluir este registro?")) return;
  let entries = Storage.get();
  entries = entries.filter(e => e.id !== id);
  Storage.save(entries);
  Sync.deleteFromRemote(id);
  UI.update();
}

function openManualModal() {
  document.getElementById('manualDate').valueAsDate = new Date();
  document.getElementById('manualModal').classList.add('active');
}
function closeManualModal() { document.getElementById('manualModal').classList.remove('active'); }

function saveManualEntry() {
  const date = document.getElementById('manualDate').value;
  const tIn = document.getElementById('manualIn').value;
  const tOut = document.getElementById('manualOut').value;
  if (!date || !tIn || !tOut) return showToast("Preencha tudo!");
  
  const start = new Date(`${date}T${tIn}`);
  const end = new Date(`${date}T${tOut}`);
  if (end <= start) return showToast("Saída deve ser após a entrada!");

  const entries = Storage.get();
  const baseId = Date.now();
  entries.push({ id: 'm-i-'+baseId, timestamp: start.toISOString(), type: 'entrada', sync: 'pending', manual: true });
  entries.push({ id: 'm-o-'+baseId, timestamp: end.toISOString(), type: 'saida', duration: end.getTime()-start.getTime(), sync: 'pending', manual: true });
  
  Storage.save(entries);
  closeManualModal();
  UI.update();
  Sync.process();
  showToast("Salvo!");
}

function generateReport() {
  const start = new Date(document.getElementById('reportStart').value + 'T00:00:00');
  const end = new Date(document.getElementById('reportEnd').value + 'T23:59:59');
  if (isNaN(start)) return showToast("Selecione as datas!");
  
  const entries = Storage.get();
  const filtered = entries.filter(e => {
    const d = new Date(e.timestamp);
    return d >= start && d <= end;
  });

  const days = {};
  filtered.forEach(e => {
    const d = new Date(e.timestamp).toLocaleDateString('pt-BR');
    if (!days[d]) days[d] = { total: 0, entries: [] };
    days[d].entries.push(e);
    days[d].total += (e.duration || 0);
  });

  let totalPeriod = 0;
  let html = `<div class="stat-card" style="margin-top:10px;">`;
  html += `<div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">
    <span style="font-weight:600;">Resumo do Período</span>
    <button class="btn-outline" onclick="printReport()">Imprimir PDF</button>
  </div>`;

  for (const d in days) {
    totalPeriod += days[d].total;
    html += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border2);">
      <span style="font-size:13px;">${d}</span>
      <span style="font-family:var(--font-mono); font-weight:600;">${UI.fmtHM(days[d].total)}</span>
    </div>`;
  }
  html += `<div style="margin-top:15px; text-align:right; font-size:16px; font-weight:600; color:var(--green);">Total: ${UI.fmtHM(totalPeriod)}</div>`;
  html += `</div>`;
  
  document.getElementById('reportOutput').innerHTML = html;

  // Prep Print Area
  let printHtml = `<h1>Relatório de Ponto</h1><p>Período: ${start.toLocaleDateString()} a ${end.toLocaleDateString()}</p><hr>`;
  for (const d in days) {
    printHtml += `<div style="display:flex; justify-content:space-between; margin:10px 0;"><span>${d}</span><b>${UI.fmtHM(days[d].total)}</b></div>`;
  }
  printHtml += `<hr><h3>Total Acumulado: ${UI.fmtHM(totalPeriod)}</h3>`;
  document.getElementById('reportPrintArea').innerHTML = printHtml;
}

function printReport() { window.print(); }
function setView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelector(`[onclick="setView('${name}')"]`).classList.add('active');
}
function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 3000);
}
function clearData() { if(confirm("Apagar tudo?")) { localStorage.clear(); location.reload(); } }
function saveConfig() {
  localStorage.setItem('sb_url', document.getElementById('sbUrl').value);
  localStorage.setItem('sb_key', document.getElementById('sbKey').value);
  location.reload();
}

Config.init();
setInterval(() => UI.update(), 1000);
UI.update();
window.addEventListener('online', () => UI.update());
window.addEventListener('offline', () => UI.update());
</script>
